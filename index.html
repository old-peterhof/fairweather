<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ambient Weather</title>
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400&family=DM+Mono:wght@300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: black;
      overflow: hidden;
      height: 100%; width: 100%;
      user-select: none;
    }

    #canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ── HUD overlay ── */
    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 52px 64px;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    #hud.visible { opacity: 1; }

    /* top-left: big temp */
    #temp-block {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #temp-display {
      font-family: 'Outfit', sans-serif;
      font-weight: 200;
      font-size: clamp(96px, 14vw, 180px);
      line-height: 0.88;
      letter-spacing: -0.03em;
      color: rgba(255,255,255,0.92);
      text-shadow: 0 2px 40px rgba(0,0,0,0.4);
    }

    #temp-unit {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      font-size: clamp(13px, 1.4vw, 18px);
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      margin-top: 10px;
      margin-left: 4px;
    }

    /* top-right: time + condition */
    #top-right {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
    }

    #clock {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      font-size: clamp(13px, 1.5vw, 19px);
      letter-spacing: 0.14em;
      color: rgba(255,255,255,0.5);
    }

    #condition {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: clamp(22px, 3.2vw, 46px);
      color: rgba(255,255,255,0.82);
      text-shadow: 0 2px 24px rgba(0,0,0,0.35);
      letter-spacing: -0.01em;
    }

    /* bottom row: stats strip */
    #stats {
      display: flex;
      gap: clamp(28px, 5vw, 72px);
      align-items: flex-end;
      padding-bottom: 8px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .stat-label {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      font-size: clamp(9px, 0.9vw, 12px);
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
    }

    .stat-value {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: clamp(22px, 2.8vw, 40px);
      color: rgba(255,255,255,0.78);
      line-height: 1;
      letter-spacing: -0.01em;
    }

    .stat-unit {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      font-size: clamp(9px, 0.85vw, 11px);
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.14em;
    }

    #divider-h {
      height: 1px;
      margin-bottom: 20px;
      background: linear-gradient(90deg,
        rgba(255,255,255,0) 0%,
        rgba(255,255,255,0.12) 30%,
        rgba(255,255,255,0.12) 70%,
        rgba(255,255,255,0) 100%);
    }

    #precip-badge {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      font-size: clamp(9px, 0.9vw, 12px);
      letter-spacing: 0.22em;
      color: rgba(180, 220, 255, 0.7);
      text-transform: uppercase;
      margin-left: auto;
      align-self: flex-end;
      padding-bottom: 4px;
      opacity: 0;
      transition: opacity 1.5s ease;
    }

    #precip-badge.visible { opacity: 1; }

    /* ── Settings button ── */
    #settings-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.6s ease, background 0.2s ease;
      pointer-events: none;
      z-index: 100;
    }

    #settings-btn.visible {
      opacity: 1;
      pointer-events: all;
    }

    #settings-btn:hover { background: rgba(255,255,255,0.16); }

    #settings-btn svg {
      width: 18px; height: 18px;
      stroke: rgba(255,255,255,0.7);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Settings panel ── */
    #settings-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: clamp(300px, 35vw, 420px);
      background: rgba(10, 10, 18, 0.82);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-left: 1px solid rgba(255,255,255,0.08);
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 200;
      overflow-y: auto;
      padding: 36px 32px 48px;
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    #settings-panel.open { transform: translateX(0); }

    /* Settings header */
    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .settings-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 22px;
      color: rgba(255,255,255,0.9);
      letter-spacing: -0.01em;
    }

    #settings-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    #settings-close:hover { background: rgba(255,255,255,0.14); }

    #settings-close svg {
      width: 14px; height: 14px;
      stroke: rgba(255,255,255,0.6);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
    }

    /* Section */
    .settings-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .settings-section-label {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    /* Row */
    .settings-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .settings-row-label {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      font-size: 15px;
      color: rgba(255,255,255,0.7);
    }

    .settings-row-sub {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      margin-top: 2px;
      letter-spacing: 0.05em;
    }

    /* Toggle */
    .toggle {
      position: relative;
      width: 44px; height: 24px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle input:checked + .toggle-track { background: rgba(120,180,255,0.5); }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px; left: 3px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: white;
      transition: transform 0.2s;
    }

    .toggle input:checked + .toggle-track::after { transform: translateX(20px); }

    /* Slider */
    .settings-slider {
      width: 100%;
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.15);
      outline: none;
      cursor: pointer;
    }

    .settings-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(255,255,255,0.85);
      cursor: pointer;
    }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.08em;
    }

    #timeout-display {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.08em;
    }

    /* Theme / font pickers */
    .option-group {
      display: flex;
      gap: 8px;
    }

    .option-btn {
      flex: 1;
      padding: 10px 8px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.55);
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 300;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .option-btn.active {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.9);
    }

    .option-btn:hover:not(.active) { background: rgba(255,255,255,0.08); }

    /* Location input */
    .settings-input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 10px 14px;
      color: rgba(255,255,255,0.8);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .settings-input:focus { border-color: rgba(255,255,255,0.3); }
    .settings-input::placeholder { color: rgba(255,255,255,0.25); }

    /* Buttons */
    .settings-btn-row {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      flex: 1;
      padding: 11px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 300;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      text-align: center;
    }

    .action-btn:hover { background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.95); }
    .action-btn:active { background: rgba(255,255,255,0.18); }

    .action-btn.danger {
      border-color: rgba(255,100,100,0.2);
      color: rgba(255,150,150,0.7);
    }
    .action-btn.danger:hover { background: rgba(255,80,80,0.1); color: rgba(255,180,180,0.9); }

    /* Status message */
    #settings-status {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: rgba(120,200,120,0.7);
      letter-spacing: 0.08em;
      min-height: 16px;
      text-align: center;
    }

    /* Scrim behind panel */
    #settings-scrim {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      z-index: 150;
      pointer-events: none;
      transition: background 0.4s ease;
    }

    #settings-scrim.open {
      pointer-events: all;
      background: rgba(0,0,0,0.25);
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<!-- HUD -->
<div id="hud">
  <div style="display:flex; justify-content:space-between; align-items:flex-start;">
    <div id="temp-block">
      <div id="temp-display">—</div>
      <div id="temp-unit">Degrees Fahrenheit</div>
    </div>
    <div id="top-right">
      <div id="clock">——:——</div>
      <div id="condition">—</div>
    </div>
  </div>
  <div>
    <div id="divider-h"></div>
    <div id="stats">
      <div class="stat">
        <div class="stat-label">Humidity</div>
        <div class="stat-value" id="stat-humidity">—</div>
        <div class="stat-unit">percent</div>
      </div>
      <div class="stat">
        <div class="stat-label">Wind</div>
        <div class="stat-value" id="stat-wind">—</div>
        <div class="stat-unit">mph</div>
      </div>
      <div class="stat">
        <div class="stat-label">Gusts</div>
        <div class="stat-value" id="stat-gust">—</div>
        <div class="stat-unit">mph</div>
      </div>
      <div class="stat">
        <div class="stat-label">Cloud Cover</div>
        <div class="stat-value" id="stat-clouds">—</div>
        <div class="stat-unit">percent</div>
      </div>
      <div id="precip-badge" class="stat">
        <div class="stat-label" id="precip-label">Rain</div>
        <div class="stat-value" id="precip-value">—</div>
        <div class="stat-unit">mm / hr</div>
      </div>
    </div>
  </div>
</div>

<!-- Settings button -->
<button id="settings-btn" aria-label="Settings">
  <svg viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="3"/>
    <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
  </svg>
</button>

<!-- Scrim -->
<div id="settings-scrim"></div>

<!-- Settings panel -->
<div id="settings-panel">
  <div class="settings-header">
    <div class="settings-title">Settings</div>
    <div id="settings-close">
      <svg viewBox="0 0 14 14"><path d="M1 1l12 12M13 1L1 13"/></svg>
    </div>
  </div>

  <!-- Display -->
  <div class="settings-section">
    <div class="settings-section-label">Display</div>

    <div class="slider-row">
      <div class="settings-row">
        <div class="settings-row-label">Auto-hide after</div>
        <div id="timeout-display">30 sec</div>
      </div>
      <input type="range" class="settings-slider" id="timeout-slider" min="0" max="900" step="5" value="30">
      <div class="slider-labels"><span>0 sec</span><span>15 min</span></div>
    </div>
  </div>

  <!-- Appearance -->
  <div class="settings-section">
    <div class="settings-section-label">Appearance</div>

    <div>
      <div class="settings-row-label" style="margin-bottom:10px;">Color theme</div>
      <div class="option-group">
        <button class="option-btn active" data-theme="natural">Natural</button>
        <button class="option-btn" data-theme="mono">B&W</button>
        <button class="option-btn" data-theme="ember">Ember</button>
      </div>
    </div>

    <div>
      <div class="settings-row-label" style="margin-bottom:10px;">Font</div>
      <div class="option-group">
        <button class="option-btn active" data-font="sans">Sans-serif</button>
        <button class="option-btn" data-font="serif">Serif</button>
      </div>
    </div>
  </div>

  <!-- Location -->
  <div class="settings-section">
    <div class="settings-section-label">Location</div>

    <div>
      <div class="settings-row-label" style="margin-bottom:10px;">Search by city</div>
      <div style="display:flex; gap:8px;">
        <input class="settings-input" id="city-input" type="text" placeholder="e.g. Aviemore, Scotland">
        <button class="action-btn" id="city-search-btn" style="flex:0 0 auto; padding: 11px 18px;">Go</button>
      </div>
    </div>

    <div>
      <div class="settings-row-label" style="margin-bottom:10px;">Manual coordinates</div>
      <div style="display:flex; gap:8px;">
        <input class="settings-input" id="lat-input" type="text" placeholder="Lat">
        <input class="settings-input" id="lon-input" type="text" placeholder="Lon">
      </div>
    </div>

    <div class="settings-btn-row">
      <button class="action-btn" id="use-device-location-btn">Use device location</button>
      <button class="action-btn" id="apply-coords-btn">Apply</button>
    </div>
  </div>

  <!-- System -->
  <div class="settings-section">
    <div class="settings-section-label">System</div>
    <div class="settings-btn-row">
      <button class="action-btn" id="refresh-weather-btn">Refresh weather</button>
      <button class="action-btn danger" id="restart-server-btn">Restart server</button>
    </div>
  </div>

  <div id="settings-status"></div>
</div>

<script>
/* =============================================
   HUD + Settings State
============================================= */
const hudEl          = document.getElementById('hud');
const settingsBtn    = document.getElementById('settings-btn');
const settingsPanel  = document.getElementById('settings-panel');
const settingsClose  = document.getElementById('settings-close');
const settingsScrim  = document.getElementById('settings-scrim');
const statusEl       = document.getElementById('settings-status');

// Settings state — persisted to localStorage
const appSettings = {
  hudEnabled:   true,
  timeoutSec:   30,
  theme:        'natural',
  font:         'sans',
  lat:          null,
  lon:          null,
};

// Load saved settings
try {
  const saved = JSON.parse(localStorage.getItem('wxSettings') || '{}');
  Object.assign(appSettings, saved);
} catch(e) {}

function saveSettings() {
  try { localStorage.setItem('wxSettings', JSON.stringify(appSettings)); } catch(e) {}
}

// ── HUD visibility ──
let hudVisible    = false;
let hudPinned     = false; // true while settings panel is open
let hideTimer     = null;

function showHUD() {
  hudVisible = true;
  hudEl.classList.add('visible');
  settingsBtn.classList.add('visible');
  resetHideTimer();
}

function hideHUD() {
  if (hudPinned) return;
  hudVisible = false;
  hudEl.classList.remove('visible');
  settingsBtn.classList.remove('visible');
}

function resetHideTimer() {
  clearTimeout(hideTimer);
  if (appSettings.timeoutSec === 0) return; // 0 = stay visible forever
  hideTimer = setTimeout(hideHUD, appSettings.timeoutSec * 1000);
}

// Show on load
showHUD();

// Tap/click anywhere on canvas shows HUD
document.addEventListener('pointerdown', (e) => {
  // Don't intercept clicks on settings panel or button
  if (settingsPanel.contains(e.target) || settingsBtn.contains(e.target)) return;
  if (hudVisible) {
    resetHideTimer();
  } else {
    showHUD();
  }
});

// ── Settings panel ──
function openSettings() {
  hudPinned = true;
  clearTimeout(hideTimer);
  showHUD();
  settingsPanel.classList.add('open');
  settingsScrim.classList.add('open');
}

function closeSettings() {
  settingsPanel.classList.remove('open');
  settingsScrim.classList.remove('open');
  hudPinned = false;
  resetHideTimer();
}

settingsBtn.addEventListener('click', (e) => { e.stopPropagation(); openSettings(); });
settingsClose.addEventListener('click', closeSettings);
settingsScrim.addEventListener('click', closeSettings);

// ── Timeout slider ──
const timeoutSlider  = document.getElementById('timeout-slider');
const timeoutDisplay = document.getElementById('timeout-display');

function formatTimeout(sec) {
  if (sec === 0)    return 'Never';
  if (sec < 60)     return `${sec} sec`;
  if (sec % 60 === 0) return `${sec/60} min`;
  return `${Math.floor(sec/60)}m ${sec%60}s`;
}

timeoutSlider.value = appSettings.timeoutSec;
timeoutDisplay.textContent = formatTimeout(appSettings.timeoutSec);

timeoutSlider.addEventListener('input', () => {
  appSettings.timeoutSec = parseInt(timeoutSlider.value);
  timeoutDisplay.textContent = formatTimeout(appSettings.timeoutSec);
  saveSettings();
  resetHideTimer();
});

// ── Theme picker ──
document.querySelectorAll('[data-theme]').forEach(btn => {
  if (btn.dataset.theme === appSettings.theme) btn.classList.add('active');
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-theme]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    appSettings.theme = btn.dataset.theme;
    saveSettings();
    applyTheme();
  });
});

function applyTheme() {
  // tempToColors reads appSettings.theme on every call — nothing else needed here
}

// ── Font picker ──
document.querySelectorAll('[data-font]').forEach(btn => {
  if (btn.dataset.font === appSettings.font) btn.classList.add('active');
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-font]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    appSettings.font = btn.dataset.font;
    saveSettings();
    applyFont();
  });
});

function applyFont() {
  const display = appSettings.font === 'serif'
    ? "'Cormorant Garamond', serif"
    : "'Outfit', sans-serif";
  document.querySelectorAll('#temp-display, #condition, .stat-value').forEach(el => {
    el.style.fontFamily = display;
  });
}

applyFont();

// ── Location ──
const cityInput    = document.getElementById('city-input');
const latInput     = document.getElementById('lat-input');
const lonInput     = document.getElementById('lon-input');

if (appSettings.lat) latInput.value = appSettings.lat;
if (appSettings.lon) lonInput.value = appSettings.lon;

function setStatus(msg, isError = false) {
  statusEl.textContent = msg;
  statusEl.style.color = isError ? 'rgba(255,120,120,0.8)' : 'rgba(120,200,120,0.8)';
  setTimeout(() => { statusEl.textContent = ''; }, 4000);
}

// City search via OWM geocoding
document.getElementById('city-search-btn').addEventListener('click', async () => {
  const q = cityInput.value.trim();
  if (!q) return;
  setStatus('Searching…');
  try {
    const res  = await fetch(`/geocode?q=${encodeURIComponent(q)}`);
    const data = await res.json();
    if (data.error) { setStatus(data.error, true); return; }
    latInput.value = data.lat.toFixed(5);
    lonInput.value = data.lon.toFixed(5);
    setStatus(`Found: ${data.name}`);
  } catch(e) { setStatus('Search failed', true); }
});

// Use device location

   Weather State
============================================= */
let weather = {
  temp: 65, clouds: 0,
  sunrise: 0, sunset: 0,
  windSpeed: 0, windGust: null,
  rain: 0, snow: 0,
  humidity: null,
  condition: null
};

let displayedTemp   = weather.temp;
let displayedClouds = 0;
let displayedWind   = 0;
let displayedRain   = 0;
let gustPulse       = 0;

/* =============================================
   Gust Event System
   Fires discrete gusts on a randomized timer,
   shaped with fast attack / slow decay envelope
============================================= */
const gust = {
  active:    false,
  intensity: 0,      // 0–1, scaled from windGust mph
  envelope:  0,      // current envelope value 0–1
  duration:  0,      // total gust duration in ms
  elapsed:   0,      // ms since gust started
  attackFrac: 0.15,  // first 15% = attack
  nextGustIn: 4000,  // ms until next gust fires
  timeSinceLast: 0,  // ms accumulator
};

// Call every frame with delta ms
function tickGust(deltaMs) {
  const gustMph = weather.windGust || 0;
  const windMph = weather.windSpeed || 0;

  // Only fire gusts if gust is meaningfully above sustained wind
  const gustExcess = Math.max(0, gustMph - windMph);

  gust.timeSinceLast += deltaMs;

  if (!gust.active && gust.timeSinceLast >= gust.nextGustIn && gustExcess > 4) {
    // Fire a new gust
    gust.active    = true;
    gust.elapsed   = 0;
    gust.intensity = Math.min(gustExcess / 40, 1); // 40mph excess = full intensity
    gust.duration  = 1200 + Math.random() * 1800;  // 1.2–3s
    gust.timeSinceLast = 0;
    // Next gust in 8–22s, shorter gaps at higher wind speeds
    const baseInterval = lerp(22000, 8000, Math.min(windMph / 40, 1));
    gust.nextGustIn = baseInterval * (0.6 + Math.random() * 0.8);
  }

  if (gust.active) {
    gust.elapsed += deltaMs;
    const t = Math.min(gust.elapsed / gust.duration, 1);
    const attack = gust.attackFrac;

    if (t < attack) {
      // Fast attack: ease-in
      gust.envelope = (t / attack) * (t / attack);
    } else {
      // Slow decay: ease-out
      const decayT = (t - attack) / (1 - attack);
      gust.envelope = 1 - decayT * decayT;
    }

    if (t >= 1) {
      gust.active   = false;
      gust.envelope = 0;
    }
  } else {
    gust.envelope = 0;
  }
}

let geoCoords = undefined; // undefined = not yet fetched, null = failed/denied

function getLocation() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      console.warn('Geolocation not supported, using server default');
      resolve(null);
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
      (err) => {
        console.warn('Geolocation denied or failed, using server default:', err.message);
        resolve(null);
      },
      { timeout: 8000, maximumAge: 5 * 60 * 1000 } // cache position for 5 min
    );
  });
}

async function fetchWeather() {
  try {
    // First call: request location. After that reuse cached value (even if null).
    if (geoCoords === undefined) {
      geoCoords = await getLocation();
    }

    const url = geoCoords
      ? `/weather.json?lat=${geoCoords.lat.toFixed(5)}&lon=${geoCoords.lon.toFixed(5)}`
      : '/weather.json';

    const res  = await fetch(url);
    const data = await res.json();
    if (!data.error) {
      weather = data;
      updateHUD();
    }
  } catch (e) {
    console.warn('Weather fetch failed, using cached value');
  }
}

function conditionLabel(data) {

  if (data.condition) return data.condition;
  if (data.snow > 0.1) return 'Snowing';
  if (data.rain > 0.1) return 'Raining';

  if (c < 10) return 'Clear';

  if (c < 60) return 'Partly Cloudy';

/* =============================================
   Utility
============================================= */
function lerp(a, b, t) { return a + (b - a) * t; }

function getDayPhase(now, sunrise, sunset) {
  if (!sunrise || !sunset) return 0.5;
  const s = now / 1000;
  // Full 24-hour cycle mapped 0→1
  // midnight=0, sunrise, noon, sunset, midnight=1
  const dayLen   = 86400;
  const midnight = sunrise - (sunset - sunrise); // approximate prior midnight
  let elapsed    = s - midnight;
  if (elapsed < 0)    elapsed += dayLen;
  if (elapsed > dayLen) elapsed -= dayLen;
  return Math.min(elapsed / dayLen, 1);
}

function parseColor(c) {
  if (c.startsWith('#')) {
    const n = parseInt(c.slice(1), 16);
    return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
  }
  const m = c.match(/\d+/g);
  return m ? m.map(Number) : [0,0,0];
}

function mixColors(c1, c2, t) {
  const [r1,g1,b1] = parseColor(c1);
  const [r2,g2,b2] = parseColor(c2);
  return `rgb(${Math.round(lerp(r1,r2,t))},${Math.round(lerp(g1,g2,t))},${Math.round(lerp(b1,b2,t))})`;
}

function adjustColor(rgb, brightness, saturation) {
  const [r,g,b] = parseColor(rgb);
  const gray = (r + g + b) / 3;
  const nr = gray + (r - gray) * saturation;
  const ng = gray + (g - gray) * saturation;
  const nb = gray + (b - gray) * saturation;
  return `rgb(${Math.round(nr*brightness)},${Math.round(ng*brightness)},${Math.round(nb*brightness)})`;
}

/* =============================================
   Sky Color — full 24-hr cycle
============================================= */
function dayPhaseToColor(phase) {
  // phase 0→1 = midnight→midnight
  // stops: 0=midnight, 0.25=sunrise, 0.5=noon, 0.75=sunset, 1=midnight
  const stops = [
    [0,    '#0a0620'],  // deep night
    [0.18, '#160b2e'],  // pre-dawn
    [0.25, '#f2b04c'],  // sunrise
    [0.38, '#5ab4e0'],  // morning
    [0.50, '#2fa4dd'],  // noon
    [0.65, '#4a9cc4'],  // afternoon
    [0.75, '#c23b22'],  // sunset
    [0.85, '#1a0930'],  // dusk
    [1.0,  '#0a0620'],  // midnight
  ];

  for (let i = 0; i < stops.length - 1; i++) {
    const [t0, c0] = stops[i];
    const [t1, c1] = stops[i + 1];
    if (phase >= t0 && phase <= t1) {
      return mixColors(c0, c1, (phase - t0) / (t1 - t0));
    }
  }
  return stops[0][1];
}

/* =============================================
   Temperature → Color Mapping
============================================= */
function tempToColors(t) {
  const theme = appSettings.theme;

  if (theme === 'mono') {
    // B&W: desaturated cool greys, brightness shifts subtly with temperature
    if (t < 32) return ['#0a0a0f', '#2a2a35', '#8888a0'];
    if (t < 50) return ['#0f0f18', '#303040', '#9090a8'];
    if (t < 65) return ['#141420', '#383848', '#9898b0'];
    if (t < 80) return ['#18181e', '#404050', '#a0a0b8'];
    if (t < 95) return ['#1a1a20', '#484858', '#a8a8c0'];
    return          ['#1c1c22', '#505060', '#b0b0c8'];
  }

  if (theme === 'ember') {
    // Ember: deep reds/oranges/ambers regardless of temperature
    if (t < 32) return ['#1a0500', '#5c1a00', '#c45000'];
    if (t < 50) return ['#1f0800', '#6b2200', '#d46010'];
    if (t < 65) return ['#220a00', '#7a2800', '#e07020'];
    if (t < 80) return ['#2a0a00', '#8c3000', '#e88030'];
    if (t < 95) return ['#300800', '#9e3800', '#f09040'];
    return          ['#380600', '#b04000', '#ffa050'];
  }

  // Natural (default)
  if (t < 32) return ['#081a33', '#2b6f9e', '#9ed3ff'];
  if (t < 50) return ['#102f4f', '#3c8dbd', '#c6e6f7'];
  if (t < 65) return ['#1c4f3f', '#6fbf9b', '#e6f2b8'];
  if (t < 80) return ['#7a3f14', '#d18b3a', '#f7e6b5'];
  if (t < 95) return ['#8c2d1a', '#e06b4a', '#f4c1a1'];
  return          ['#5c0f14', '#c63a5a', '#ffd6e8'];
}

/* =============================================
   Stars
============================================= */
const STAR_COUNT = 220;
const stars = Array.from({ length: STAR_COUNT }, () => ({
  x:      Math.random(),
  y:      Math.random() * 0.72,   // only upper 72% of screen
  r:      0.4 + Math.random() * 1.3,
  phase:  Math.random() * Math.PI * 2,
  speed:  0.3 + Math.random() * 0.7
}));

/* =============================================
   Clouds — chunky puffs in top 30%
   Each cloud is a cluster of overlapping ellipses
============================================= */
const CLOUD_COUNT = 9;
const clouds_data = Array.from({ length: CLOUD_COUNT }, (_, i) => {
  // Each cloud: position, size, drift speed, and a set of puff offsets
  const puffCount = 4 + Math.floor(Math.random() * 4);
  return {
    x:          Math.random(),                          // 0–1 normalized x
    y:          0.04 + Math.random() * 0.22,            // top 26% of screen
    w:          0.18 + Math.random() * 0.22,            // width as fraction of screen
    h:          0.04 + Math.random() * 0.06,            // height
    driftSpeed: 0.000018 + Math.random() * 0.000025,    // very slow
    driftPhase: Math.random() * Math.PI * 2,
    bobSpeed:   0.0004 + Math.random() * 0.0004,
    bobPhase:   Math.random() * Math.PI * 2,
    opacity:    0.55 + Math.random() * 0.35,
    puffs: Array.from({ length: puffCount }, () => ({
      dx:  (Math.random() - 0.5),      // relative to cloud center, -0.5–0.5
      dy:  (Math.random() - 0.5) * 0.6,
      rx:  0.3 + Math.random() * 0.55, // relative rx (fraction of cloud w)
      ry:  0.5 + Math.random() * 0.6,  // relative ry (fraction of cloud h)
    }))
  };
});

/* =============================================
   Fog blobs — wispy irregular shapes across full frame
============================================= */
const FOG_BLOB_COUNT = 14;
const fog_blobs = Array.from({ length: FOG_BLOB_COUNT }, () => ({
  x:          Math.random(),
  y:          Math.random(),
  w:          0.25 + Math.random() * 0.40,
  h:          0.08 + Math.random() * 0.14,
  driftSpeed: 0.000008 + Math.random() * 0.000018,
  driftPhase: Math.random() * Math.PI * 2,
  bobSpeed:   0.00015 + Math.random() * 0.0002,
  bobPhase:   Math.random() * Math.PI * 2,
  opacity:    0.18 + Math.random() * 0.28,
}));

/* =============================================
   Tendrils
============================================= */
const ARM_COUNT = 24;
const arms = Array.from({ length: ARM_COUNT }, (_, i) => ({
  baseAngle:    (i / ARM_COUNT) * Math.PI * 2,
  angleSpeed:   0.05 + Math.random() * 0.05,
  lengthSpeed:  0.03 + Math.random() * 0.04,
  anglePhase:   Math.random() * Math.PI * 2,
  lengthPhase:  Math.random() * Math.PI * 2,
  bendSpeed:    0.018 + Math.random() * 0.025,  // how fast the arm curves
  bendPhase:    Math.random() * Math.PI * 2,     // independent phase per arm
  gustSens:     0.5 + Math.random() * 1.0,
}));

// Shared tip-displacement spring — G pushes it, it oscillates back
// This is lateral screen-space displacement applied near the tip only
const tipSpring = {
  offset: 0,   // current lateral displacement (canvas pixels)
  vel:    0,   // velocity
};

function windToSway(mph) {
  return Math.min(Math.max(mph, 0), 60) / 60;
}

/* =============================================
   Rain / Snow Particles
============================================= */
const MAX_PARTICLES = 160;
const particles = Array.from({ length: MAX_PARTICLES }, () => ({
  x: Math.random(), y: Math.random(),
  vx: 0, vy: 0, active: false, isSnow: false
}));

function precipIntensity(mm) { return Math.min(mm / 8, 1); }

/* =============================================
   Animation Loop
============================================= */
let time = 0;

function draw() {
  const now      = performance.now();
  const deltaMs  = Math.min(now - lastFrameTime, 100); // cap at 100ms
  lastFrameTime  = now;

  time += 0.003;
  tickGust(deltaMs);

  // Convenient shorthand used throughout
  const G = gust.envelope * gust.intensity; // 0–1, peaks during gust event

  /* — smooth values — */
  displayedTemp   = lerp(displayedTemp,   weather.temp    || 65, 0.0008);
  displayedClouds = lerp(displayedClouds, weather.clouds  || 0,  0.002);
  displayedWind   = lerp(displayedWind,   weather.windSpeed || 0, 0.002);
  displayedRain   = lerp(displayedRain,   Math.max(weather.rain || 0, weather.snow || 0), 0.002);

  const [core, body, baseEdge] = tempToColors(displayedTemp);
  const cloudCover = Math.min(displayedClouds / 100, 1);
  const windFactor = windToSway(displayedWind);

  // Sway: sustained wind sets baseline oscillation amplitude
  const swayAmp = 0.25 + windFactor * 1.2;

  // Tip spring: G pushes laterally, spring restores, damping bleeds energy
  // Target displacement scales with gust intensity and canvas size
  const tipTarget = G * canvas.width * 0.055;
  tipSpring.vel += (tipTarget - tipSpring.offset) * 0.018;
  tipSpring.vel *= 0.78;  // damping — tune lower for more oscillation
  tipSpring.offset += tipSpring.vel;

  /* — sky — */
  const phase    = getDayPhase(Date.now(), weather.sunrise, weather.sunset);
  const baseSky  = dayPhaseToColor(phase);
  const skyColor = adjustColor(
    baseSky,
    lerp(1.0, 0.55, cloudCover),
    appSettings.theme === 'mono'  ? lerp(0.0, 0.08, cloudCover) :
    appSettings.theme === 'ember' ? lerp(0.4, 0.2,  cloudCover) :
    lerp(1.0, 0.65, cloudCover)
  );

  ctx.globalCompositeOperation = 'source-over';
  ctx.globalAlpha = 1.0;
  ctx.filter = 'blur(8px)';
  ctx.fillStyle = skyColor;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  /* — radial glow — */
  const breathe = Math.sin(time) * 0.06;
  const pulse   = 0.08 * Math.sin(time * 0.8);
  const driftX  = Math.sin(time * 0.12) * canvas.width * 0.03;
  const bgCx    = canvas.width / 2 + driftX;
  const bgCy    = canvas.height * 0.95;
  const bgR     = canvas.height * (1.05 + pulse);
  const edge    = mixColors(baseEdge, skyColor, 0.6);

  const bg = ctx.createRadialGradient(bgCx, bgCy, canvas.height * 0.18, bgCx, bgCy, bgR);
  bg.addColorStop(0.0,  mixColors(core, body, 0.35));
  bg.addColorStop(0.45, mixColors(body, edge, 0.4));
  bg.addColorStop(1.0,  skyColor);

  ctx.filter = 'blur(12px)';
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.filter = 'none';

  /* ── STARS ── */
  const nightness = 1 - Math.sin(Math.max(0, Math.min(1, phase * Math.PI)));
  const starVis   = Math.pow(nightness, 1.8) * (1 - cloudCover * 0.85);

  if (starVis > 0.01) {
    ctx.save();
    ctx.filter = 'none';
    for (const s of stars) {
      const twinkle = 0.55 + 0.45 * Math.sin(time * s.speed + s.phase);
      const alpha   = starVis * twinkle * 0.9;
      const sx      = s.x * canvas.width;
      const sy      = s.y * canvas.height;
      const glow    = ctx.createRadialGradient(sx, sy, 0, sx, sy, s.r * 3.5);
      glow.addColorStop(0,   `rgba(220,228,255,${alpha})`);
      glow.addColorStop(0.4, `rgba(200,215,255,${alpha * 0.4})`);
      glow.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(sx, sy, s.r * 3.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  /* ── CLOUDS ── top 30%, density driven by cloud cover % */
  // cloudVis: 0 = clear sky, 1 = fully overcast
  const cloudVis = Math.pow(cloudCover, 0.7);

  if (cloudVis > 0.02) {
    cloudCtx.clearRect(0, 0, cloudCanvas.width, cloudCanvas.height);

    const dayness = Math.sin(Math.max(0, Math.min(1, phase)) * Math.PI);
    const cr = Math.round(lerp(80,  245, dayness));
    const cg = Math.round(lerp(90,  248, dayness));
    const cb = Math.round(lerp(115, 255, dayness));

    for (let ci = 0; ci < CLOUD_COUNT; ci++) {
      const cd = clouds_data[ci];
      const gustDrift = G * 0.012 * (time % 1);
      const drift = Math.sin(time * cd.driftSpeed * 1000 + cd.driftPhase) * 0.18
                  + (displayedWind / 60) * time * cd.driftSpeed * 40
                  + gustDrift;
      const bob   = Math.sin(time * cd.bobSpeed * 1000 + cd.bobPhase) * 0.008;

      const cx_c  = ((cd.x + drift) % 1.3 - 0.15) * cloudCanvas.width;
      const cy_c  = (cd.y + bob) * cloudCanvas.height;
      const cw    = cd.w * cloudCanvas.width;
      const ch    = cd.h * cloudCanvas.height;

      const showFraction = Math.min(1, cloudVis * CLOUD_COUNT / (ci + 1));
      if (showFraction < 0.05) continue;

      const alpha = cd.opacity * cloudVis * showFraction;

      for (const puff of cd.puffs) {
        const px = cx_c + puff.dx * cw;
        const py = cy_c + puff.dy * ch;
        const rx = puff.rx * cw * 0.5;
        const ry = puff.ry * ch * 0.9;

        const grad = cloudCtx.createRadialGradient(px, py, 0, px, py, Math.max(rx, ry));
        grad.addColorStop(0,   `rgba(${cr},${cg},${cb},${alpha})`);
        grad.addColorStop(0.6, `rgba(${cr},${cg},${cb},${alpha * 0.6})`);
        grad.addColorStop(1,   `rgba(${cr},${cg},${cb},0)`);

        cloudCtx.save();
        cloudCtx.scale(1, ry / Math.max(rx, ry));
        cloudCtx.beginPath();
        cloudCtx.arc(px, py * (Math.max(rx, ry) / ry), Math.max(rx, ry), 0, Math.PI * 2);
        cloudCtx.fillStyle = grad;
        cloudCtx.fill();
        cloudCtx.restore();
      }
    }

    // Blit cloud offscreen onto main canvas with blur
    ctx.save();
    ctx.filter = 'blur(10px)';
    ctx.drawImage(cloudCanvas, 0, 0);
    ctx.restore();
  }

  /* ── FOG BLOBS ── wispy shapes across entire frame, driven by humidity */
  const humidity    = weather.humidity || 0;
  const fogStrength = Math.pow(Math.max(0, (humidity - 35) / 65), 1.4);

  if (fogStrength > 0.01) {
    ctx.save();
    ctx.filter = 'blur(6px)';

    // Fog color: cool blue-grey at night, milky white by day
    const dayness2 = Math.sin(Math.max(0, Math.min(1, phase)) * Math.PI);
    const fr = Math.round(lerp(130, 215, dayness2));
    const fg_c = Math.round(lerp(145, 222, dayness2));
    const fb = Math.round(lerp(175, 228, dayness2));

    for (const blob of fog_blobs) {
      const drift = Math.sin(time * blob.driftSpeed * 1000 + blob.driftPhase) * 0.12;
      const bob   = Math.sin(time * blob.bobSpeed   * 1000 + blob.bobPhase)   * 0.025;

      const bx = ((blob.x + drift) % 1.2 - 0.1) * canvas.width;
      const by = (blob.y + bob) * canvas.height;
      const bw = blob.w * canvas.width;
      const bh = blob.h * canvas.height;

      const alpha = blob.opacity * fogStrength;

      // Elongated radial gradient for wispy feel
      const grad = ctx.createRadialGradient(bx, by, 0, bx, by, bw * 0.5);
      grad.addColorStop(0,   `rgba(${fr},${fg_c},${fb},${alpha})`);
      grad.addColorStop(0.5, `rgba(${fr},${fg_c},${fb},${alpha * 0.5})`);
      grad.addColorStop(1,   `rgba(${fr},${fg_c},${fb},0)`);

      ctx.save();
      ctx.scale(1, bh / (bw * 0.5));
      ctx.beginPath();
      ctx.arc(bx, by * (bw * 0.5 / bh), bw * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.restore();
    }

    ctx.restore();
  }

  /* — tendrils — drawn onto offscreen canvas, blitted with blur — */
  tendrilCtx.clearRect(0, 0, tendrilCanvas.width, tendrilCanvas.height);
  tendrilCtx.lineCap = 'round';

  const cx         = canvas.width / 2;
  const cy         = canvas.height * 1.05;
  const baseRadius = canvas.height * (0.9 + breathe);

  for (const arm of arms) {
    const wave  = Math.sin(time * arm.angleSpeed + arm.anglePhase) * swayAmp;
    const angle = arm.baseAngle + wave;
    const len   = baseRadius * (0.75 + Math.sin(time * arm.lengthSpeed + arm.lengthPhase) * 0.25);

    const tipX = cx + Math.cos(angle) * len;
    const tipY = cy + Math.sin(angle) * len;
    const perpX = -Math.sin(angle);
    const perpY =  Math.cos(angle);
    const tipDisp = tipSpring.offset * arm.gustSens;

    const ex  = tipX + perpX * tipDisp;
    const ey  = tipY + perpY * tipDisp;

    // Bend: oscillates along each arm's perpendicular, driven by wind + gusts
    // Low wind = gentle lazy curve, high wind/gusts = pronounced snaking
    const bendAmp = len * (0.14 + windFactor * 0.28 + G * 0.32);
    const bend    = Math.sin(time * 0.4 + arm.anglePhase) * bendAmp;
    const bend2   = Math.sin(time * 0.6 + arm.anglePhase + 1.2) * bendAmp * 0.6;

    // c1 bends one way, c2 the other — gives an S-curve feel at higher winds
    const c1x = cx + Math.cos(angle) * len * 0.3  + perpX * (tipDisp * 0.15 + bend);
    const c1y = cy + Math.sin(angle) * len * 0.3  + perpY * (tipDisp * 0.15 + bend);
    const c2x = cx + Math.cos(angle) * len * 0.65 + perpX * (tipDisp * 0.6  - bend2);
    const c2y = cy + Math.sin(angle) * len * 0.65 + perpY * (tipDisp * 0.6  - bend2);

    const grad = tendrilCtx.createLinearGradient(cx, cy, ex, ey);
    grad.addColorStop(0.0, core);
    grad.addColorStop(0.6, body);
    grad.addColorStop(1.0, edge);
    tendrilCtx.strokeStyle = grad;

    const SEG = 80;
    let px = cx, py = cy;
    for (let i = 1; i <= SEG; i++) {
      const t = i / SEG;
      const mt = 1 - t;
      const x = mt*mt*mt*cx + 3*mt*mt*t*c1x + 3*mt*t*t*c2x + t*t*t*ex;
      const y = mt*mt*mt*cy + 3*mt*mt*t*c1y + 3*mt*t*t*c2y + t*t*t*ey;
      tendrilCtx.lineWidth   = canvas.width * 0.14 * Math.pow(mt, 0.9) + 0.8;
      tendrilCtx.globalAlpha = 0.18 * (0.3 + 0.7 * Math.pow(mt, 1.4));
      tendrilCtx.beginPath(); tendrilCtx.moveTo(px, py); tendrilCtx.lineTo(x, y); tendrilCtx.stroke();
      px = x; py = y;
    }
  }

  // Blit tendril offscreen canvas onto main canvas with blur
  ctx.save();
  ctx.filter = 'blur(6px)';
  ctx.globalAlpha = 1.0;
  ctx.drawImage(tendrilCanvas, 0, 0);
  ctx.restore();

  /* — precipitation — */
  const rainMM = weather.rain || 0;
  const snowMM = weather.snow || 0;
  const rain   = precipIntensity(rainMM);
  const snow   = precipIntensity(snowMM);
  const precip = Math.max(rain, snow);
  const isSnow = snowMM > rainMM;

  if (precip > 0.05) {
    const target = Math.floor(Math.pow(precip, 0.6) * MAX_PARTICLES * 0.65);
    let active = particles.filter(p => p.active).length;
    for (const p of particles) {
      if (active >= target) break;
      if (!p.active) {
        p.active = true;
        p.isSnow = isSnow;
        p.x = Math.random() * 1.3 - 0.15;
        p.y = Math.random() * 1.2 - 0.1;
        active++;
      }
    }
  } else {
    for (const p of particles) p.active = false;
  }

  const windX    = (displayedWind / 60) * 0.002 + G * 0.008; // gusts push rain sideways hard
  const FALL_SPD = 0.007;

  for (const p of particles) {
    if (!p.active) continue;
    if (p.isSnow) {
      // Gusts scatter snow sideways
      p.vx = Math.sin(time * 0.8 + p.x * 10) * 0.0008 + G * 0.004;
      p.vy = FALL_SPD * 0.25 * (1 + snow * 0.4);
    } else {
      p.vx = Math.max(-0.012, Math.min(0.012, windX));
      p.vy = FALL_SPD * (1 + rain * 0.5 + G * 0.4); // gusts slightly speed up fall too
    }
    p.x += p.vx;
    p.y += p.vy;
    if (p.y > 1.1 || p.x < -0.2 || p.x > 1.2) {
      p.y = -0.05;
      p.x = Math.random() * 1.4 - 0.2;
    }
  }

  if (precip > 0.05) {
    ctx.save();
    ctx.filter = 'none';

    if (isSnow) {
      // Soft dots for snow
      ctx.globalAlpha = 0.55;
      ctx.fillStyle = 'rgba(230,242,255,0.9)';
      for (const p of particles) {
        if (!p.active || !p.isSnow) continue;
        const x = p.x * canvas.width;
        const y = p.y * canvas.height;
        const r = 1.5 + Math.sin(time * 2 + p.x * 20) * 0.5;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      // Streaks angled along velocity — go near-diagonal during gusts
      const streakLen  = lerp(18, 45, rain);
      const gustAngle  = G * 2.8; // how far gusts tilt the streaks
      ctx.globalAlpha  = 1;
      ctx.strokeStyle  = `rgba(200,225,255,${lerp(0.38, 0.55, G)})`;
      ctx.lineWidth    = 1;
      ctx.beginPath();
      for (const p of particles) {
        if (!p.active || p.isSnow) continue;
        const x  = p.x * canvas.width;
        const y  = p.y * canvas.height;
        const nx = (p.vx / Math.max(Math.abs(p.vy), 0.0001)) + gustAngle;
        ctx.moveTo(x, y);
        ctx.lineTo(x - nx * streakLen * 0.5, y - streakLen);
      }
      ctx.stroke();
    }

    ctx.restore();
  }

  /* — vignette — */
  const vig = ctx.createRadialGradient(
    canvas.width/2, canvas.height/2, canvas.height * 0.2,
    canvas.width/2, canvas.height/2, canvas.height
  );
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.18)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
